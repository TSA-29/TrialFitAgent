services:
  - type: web
    name: deskpilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start_render.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: STEP_API_KEY
        sync: false
      - key: CHAINLIT_AUTH_SECRET
        generateValue: true
      - key: DESKPILOT_LOGIN_USERNAME
        value: deskpilot
      - key: DESKPILOT_LOGIN_PASSWORD
        value: deskpilot
      - key: BULKBOT_DEBUG
        value: "false"
      - key: DEBUG
        value: "false"
