<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskPilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a1024;
        --bg2: #0f1a3d;
        --panel: rgba(17, 24, 50, 0.82);
        --panel-border: rgba(137, 170, 255, 0.3);
        --panel-2: rgba(13, 20, 44, 0.86);
        --text: #eaf1ff;
        --muted: #9cb0d9;
        --accent: #20d7a8;
        --user: #1d70ff;
        --assistant: #1b2447;
        --danger: #ff6666;
        --thread-hover: rgba(60, 86, 160, 0.35);
        --thread-active: rgba(75, 112, 206, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 700px at 0% 0%, #1d2a58 0%, transparent 60%),
          radial-gradient(1000px 600px at 100% 100%, #0d4f63 0%, transparent 55%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .app {
        width: min(1100px, 100%);
        min-height: min(90vh, 900px);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        display: grid;
        grid-template-columns: 290px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--panel-border);
        background: var(--panel-2);
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 0;
      }

      .sidebar-head {
        padding: 16px 14px;
        border-bottom: 1px solid var(--panel-border);
      }

      .sidebar-title {
        margin: 0;
        font-size: 0.98rem;
      }

      .sidebar-subtitle {
        margin: 4px 0 10px;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .thread-list {
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .thread-empty {
        font-size: 0.82rem;
        color: var(--muted);
        border: 1px dashed rgba(156, 176, 217, 0.35);
        border-radius: 10px;
        padding: 10px;
      }

      .thread-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: stretch;
      }

      .thread-item {
        width: 100%;
        text-align: left;
        background: rgba(21, 32, 67, 0.7);
        color: var(--text);
        border: 1px solid rgba(137, 170, 255, 0.25);
        border-radius: 10px;
        padding: 9px;
        cursor: pointer;
      }

      .thread-item:hover {
        background: var(--thread-hover);
      }

      .thread-item.active {
        background: var(--thread-active);
        border-color: rgba(133, 177, 255, 0.6);
      }

      .thread-name {
        display: block;
        font-size: 0.86rem;
        line-height: 1.25;
        font-weight: 600;
      }

      .thread-meta {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.74rem;
      }

      .thread-delete {
        background: rgba(78, 28, 41, 0.75);
        color: #ffc7c7;
        border: 1px solid rgba(255, 151, 151, 0.4);
        border-radius: 10px;
        padding: 0 10px;
        min-width: 34px;
        font-size: 0.9rem;
      }

      .thread-delete:hover {
        background: rgba(120, 35, 54, 0.85);
      }

      .sidebar-foot {
        border-top: 1px solid var(--panel-border);
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .chat {
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .title {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.4px;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .badge {
        border: 1px solid rgba(32, 215, 168, 0.45);
        color: #8ef6dc;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
      }

      #messages {
        min-height: 0;
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .msg.user {
        margin-left: auto;
        background: linear-gradient(125deg, #1252c5 0%, var(--user) 100%);
      }

      .msg.assistant {
        background: var(--assistant);
        border: 1px solid rgba(139, 158, 224, 0.4);
      }

      .msg.thinking {
        border-style: dashed;
      }

      .thinking-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .thinking-stage {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .thinking-dots {
        display: inline-flex;
        gap: 4px;
      }

      .thinking-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #9ad5ff;
        opacity: 0.35;
        animation: pulse 1.2s infinite ease-in-out;
      }

      .thinking-dots span:nth-child(2) {
        animation-delay: 0.18s;
      }

      .thinking-dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      .tools {
        max-width: 95%;
        font-size: 0.82rem;
        color: var(--muted);
        border-left: 2px solid rgba(156, 176, 217, 0.5);
        padding: 8px 0 8px 10px;
        margin-top: -4px;
      }

      .tools-title {
        font-size: 0.8rem;
        color: #b7cbf4;
        margin-bottom: 6px;
      }

      .tool-step {
        margin-bottom: 6px;
      }

      .tool-step summary {
        cursor: pointer;
      }

      .tool-step pre {
        margin: 6px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 180px;
        overflow: auto;
        background: rgba(10, 16, 36, 0.65);
        border: 1px solid rgba(137, 170, 255, 0.22);
        border-radius: 8px;
        padding: 8px;
      }

      .composer {
        border-top: 1px solid var(--panel-border);
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      textarea {
        width: 100%;
        resize: vertical;
        min-height: 58px;
        max-height: 200px;
        border: 1px solid rgba(141, 157, 209, 0.4);
        background: rgba(11, 17, 37, 0.7);
        color: var(--text);
        border-radius: 12px;
        padding: 10px;
        font: inherit;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      #sendBtn {
        background: var(--accent);
        color: #05261f;
      }

      #newChatBtn {
        background: rgba(32, 215, 168, 0.22);
        border: 1px solid rgba(100, 233, 201, 0.35);
        color: #9ef7e0;
        width: 100%;
      }

      #clearBtn,
      #clearHistoryBtn {
        background: #2a355f;
        color: var(--text);
      }

      #status {
        min-height: 1em;
        color: var(--muted);
        font-size: 0.86rem;
      }

      #status.error {
        color: var(--danger);
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      @media (max-width: 680px) {
        body {
          padding: 10px;
        }

        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
          grid-template-rows: auto auto auto;
        }

        .thread-list {
          max-height: 165px;
        }

        .msg {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <section class="sidebar-head">
          <h2 class="sidebar-title">Chat History</h2>
          <p class="sidebar-subtitle">Local to this browser, Vercel-compatible</p>
          <button id="newChatBtn" type="button">+ New Chat</button>
        </section>
        <section id="threadList" class="thread-list"></section>
        <section class="sidebar-foot">
          <button id="clearHistoryBtn" type="button">Clear All History</button>
        </section>
      </aside>

      <section class="chat">
        <section class="header">
          <div>
            <h1 class="title">DeskPilot</h1>
            <p class="subtitle" id="activeThreadLabel">Vercel-ready assistant with mock workflow tools</p>
          </div>
          <span class="badge">Serverless API</span>
        </section>

        <section id="messages"></section>

        <section class="composer">
          <textarea id="prompt" placeholder="Ask DeskPilot to draft emails, schedule, book trips, or edit Notion..."></textarea>
          <div class="row">
            <button id="sendBtn">Send</button>
            <button id="clearBtn" type="button">Clear Current Chat</button>
          </div>
          <div id="status"></div>
        </section>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "deskpilot-thread-history-v2";
      const LEGACY_STORAGE_KEY = "deskpilot-chat-history-v1";
      const MAX_HISTORY_FOR_API = 24;
      const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

      const messagesEl = document.getElementById("messages");
      const promptEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const clearBtn = document.getElementById("clearBtn");
      const statusEl = document.getElementById("status");
      const newChatBtn = document.getElementById("newChatBtn");
      const clearHistoryBtn = document.getElementById("clearHistoryBtn");
      const threadListEl = document.getElementById("threadList");
      const activeThreadLabelEl = document.getElementById("activeThreadLabel");

      let appState = loadState();
      ensureActiveThread();
      renderThreadList();
      renderMessages();

      sendBtn.addEventListener("click", onSend);
      newChatBtn.addEventListener("click", () => {
        createThread();
        persistState();
        renderThreadList();
        renderMessages();
        setStatus("Started a new chat.");
        promptEl.focus();
      });
      clearBtn.addEventListener("click", () => {
        const thread = getActiveThread();
        if (!thread) return;
        thread.messages = [];
        thread.updatedAt = nowIso();
        thread.title = "New Chat";
        persistState();
        renderThreadList();
        renderMessages();
        setStatus("Current chat cleared.");
      });
      clearHistoryBtn.addEventListener("click", () => {
        appState = { threads: [], activeThreadId: null };
        createThread();
        persistState();
        renderThreadList();
        renderMessages();
        setStatus("All saved chats were removed.");
      });
      promptEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          onSend();
        }
      });

      function nowIso() {
        return new Date().toISOString();
      }

      function createId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function truncate(text, maxLen = 40) {
        if (!text) return "";
        return text.length > maxLen ? `${text.slice(0, maxLen - 1)}...` : text;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return migrateLegacyHistory();
          }

          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.threads)) {
            return migrateLegacyHistory();
          }

          const threads = parsed.threads
            .map((thread) => sanitizeThread(thread))
            .filter(Boolean);

          return {
            threads,
            activeThreadId: typeof parsed.activeThreadId === "string" ? parsed.activeThreadId : null,
          };
        } catch {
          return migrateLegacyHistory();
        }
      }

      function migrateLegacyHistory() {
        try {
          const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
          if (!raw) {
            return { threads: [], activeThreadId: null };
          }
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return { threads: [], activeThreadId: null };
          }
          const messages = parsed
            .filter((item) => item && (item.role === "user" || item.role === "assistant"))
            .map((item) => ({
              role: item.role,
              content: String(item.content || ""),
              createdAt: nowIso(),
              toolEvents: [],
            }));
          const firstUser = messages.find((m) => m.role === "user");
          const threadId = createId();
          return {
            threads: [
              {
                id: threadId,
                title: firstUser ? truncate(firstUser.content) : "New Chat",
                createdAt: nowIso(),
                updatedAt: nowIso(),
                messages,
              },
            ],
            activeThreadId: threadId,
          };
        } catch {
          return { threads: [], activeThreadId: null };
        }
      }

      function sanitizeThread(thread) {
        if (!thread || typeof thread !== "object") return null;
        const id = String(thread.id || "");
        if (!id) return null;
        const messages = Array.isArray(thread.messages)
          ? thread.messages
              .filter((item) => item && (item.role === "user" || item.role === "assistant"))
              .map((item) => ({
                role: item.role,
                content: String(item.content || ""),
                createdAt: String(item.createdAt || nowIso()),
                toolEvents: Array.isArray(item.toolEvents) ? item.toolEvents : [],
              }))
          : [];
        return {
          id,
          title: String(thread.title || "New Chat"),
          createdAt: String(thread.createdAt || nowIso()),
          updatedAt: String(thread.updatedAt || nowIso()),
          messages,
        };
      }

      function persistState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
      }

      function setStatus(text, isError = false) {
        statusEl.textContent = text || "";
        statusEl.className = isError ? "error" : "";
      }

      function createThread() {
        const timestamp = nowIso();
        const thread = {
          id: createId(),
          title: "New Chat",
          createdAt: timestamp,
          updatedAt: timestamp,
          messages: [],
        };
        appState.threads.unshift(thread);
        appState.activeThreadId = thread.id;
        return thread;
      }

      function ensureActiveThread() {
        if (!Array.isArray(appState.threads)) {
          appState = { threads: [], activeThreadId: null };
        }
        if (!appState.threads.length) {
          createThread();
          return;
        }
        const activeExists = appState.threads.some((thread) => thread.id === appState.activeThreadId);
        if (!activeExists) {
          appState.activeThreadId = appState.threads[0].id;
        }
      }

      function getActiveThread() {
        ensureActiveThread();
        return appState.threads.find((thread) => thread.id === appState.activeThreadId) || null;
      }

      function formatThreadTime(isoText) {
        try {
          const date = new Date(isoText);
          return date.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
        } catch {
          return "";
        }
      }

      function renderThreadList() {
        threadListEl.innerHTML = "";
        if (!appState.threads.length) {
          const empty = document.createElement("div");
          empty.className = "thread-empty";
          empty.textContent = "No chats yet. Start a conversation to build history.";
          threadListEl.appendChild(empty);
          return;
        }

        appState.threads
          .slice()
          .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
          .forEach((thread) => {
            const row = document.createElement("div");
            row.className = "thread-row";

            const openBtn = document.createElement("button");
            openBtn.type = "button";
            openBtn.className = `thread-item${thread.id === appState.activeThreadId ? " active" : ""}`;
            openBtn.dataset.threadId = thread.id;

            const name = document.createElement("span");
            name.className = "thread-name";
            name.textContent = thread.title || "New Chat";
            openBtn.appendChild(name);

            const meta = document.createElement("span");
            meta.className = "thread-meta";
            meta.textContent = `${thread.messages.length} msg | ${formatThreadTime(thread.updatedAt)}`;
            openBtn.appendChild(meta);

            openBtn.addEventListener("click", () => {
              appState.activeThreadId = thread.id;
              persistState();
              renderThreadList();
              renderMessages();
            });

            const delBtn = document.createElement("button");
            delBtn.type = "button";
            delBtn.className = "thread-delete";
            delBtn.title = "Delete chat";
            delBtn.textContent = "x";
            delBtn.addEventListener("click", () => {
              appState.threads = appState.threads.filter((item) => item.id !== thread.id);
              if (!appState.threads.length) {
                createThread();
              } else if (appState.activeThreadId === thread.id) {
                appState.activeThreadId = appState.threads[0].id;
              }
              persistState();
              renderThreadList();
              renderMessages();
            });

            row.appendChild(openBtn);
            row.appendChild(delBtn);
            threadListEl.appendChild(row);
          });
      }

      function appendMessage(role, content, classes = "") {
        const node = document.createElement("article");
        node.className = `msg ${role} ${classes}`.trim();
        node.textContent = content;
        messagesEl.appendChild(node);
        return node;
      }

      function summarizeToolEvent(event) {
        const tool = event && event.tool ? String(event.tool) : "tool";
        const result = event && event.result && typeof event.result === "object" ? event.result : {};
        const status = result.status ? String(result.status) : String(event.status || "ok");
        return `${tool} (${status})`;
      }

      function appendToolEvents(toolEvents) {
        if (!toolEvents || !toolEvents.length) return;
        const box = document.createElement("section");
        box.className = "tools";

        const title = document.createElement("div");
        title.className = "tools-title";
        title.textContent = `Tool steps (${toolEvents.length})`;
        box.appendChild(title);

        toolEvents.forEach((event, idx) => {
          const details = document.createElement("details");
          details.className = "tool-step";

          const summary = document.createElement("summary");
          summary.textContent = `${idx + 1}. ${summarizeToolEvent(event)}`;
          details.appendChild(summary);

          const body = document.createElement("pre");
          body.textContent = JSON.stringify(
            {
              args: event.args || {},
              result: event.result || {},
            },
            null,
            2
          );
          details.appendChild(body);
          box.appendChild(details);
        });

        messagesEl.appendChild(box);
      }

      function renderMessages() {
        const thread = getActiveThread();
        if (!thread) return;

        activeThreadLabelEl.textContent = thread.title || "Vercel-ready assistant with mock workflow tools";
        messagesEl.innerHTML = "";

        if (!thread.messages.length) {
          appendMessage("assistant", "I am ready. Ask me to draft emails, schedule appointments, book trips, or edit Notion pages.");
        } else {
          thread.messages.forEach((item) => {
            appendMessage(item.role, item.content);
            if (item.role === "assistant" && Array.isArray(item.toolEvents) && item.toolEvents.length) {
              appendToolEvents(item.toolEvents);
            }
          });
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendThinkingMessage() {
        const node = document.createElement("article");
        node.className = "msg assistant thinking";

        const head = document.createElement("div");
        head.className = "thinking-head";

        const label = document.createElement("span");
        label.textContent = "DeskPilot is thinking";
        head.appendChild(label);

        const dots = document.createElement("span");
        dots.className = "thinking-dots";
        for (let i = 0; i < 3; i += 1) {
          dots.appendChild(document.createElement("span"));
        }
        head.appendChild(dots);

        const stage = document.createElement("div");
        stage.className = "thinking-stage";
        stage.textContent = "Planning response...";

        node.appendChild(head);
        node.appendChild(stage);
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return { node, stage };
      }

      function startThinkingStages(stageEl) {
        const stages = [
          "Planning response...",
          "Checking if tools are needed...",
          "Running tool workflow...",
          "Preparing final answer...",
        ];
        let index = 0;
        stageEl.textContent = stages[index];
        const timer = setInterval(() => {
          index = (index + 1) % stages.length;
          stageEl.textContent = stages[index];
        }, 1100);
        return () => clearInterval(timer);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function animateAssistantText(node, text) {
        node.classList.remove("thinking");
        node.textContent = "";

        if (!text) return;

        const total = text.length;
        const chunkSize = Math.max(1, Math.floor(total / 180));
        let idx = 0;
        while (idx < total) {
          idx = Math.min(total, idx + chunkSize);
          node.textContent = text.slice(0, idx);
          messagesEl.scrollTop = messagesEl.scrollHeight;
          await sleep(12);
        }
      }

      function titleFromMessages(messages) {
        const firstUser = messages.find((item) => item.role === "user");
        return firstUser ? truncate(firstUser.content) : "New Chat";
      }

      async function onSend() {
        const prompt = promptEl.value.trim();
        if (!prompt) return;

        const thread = getActiveThread();
        if (!thread) return;

        sendBtn.disabled = true;
        promptEl.disabled = true;
        setStatus("Thinking...");

        const userMessage = { role: "user", content: prompt, createdAt: nowIso(), toolEvents: [] };
        thread.messages.push(userMessage);
        thread.title = titleFromMessages(thread.messages);
        thread.updatedAt = nowIso();
        appState.activeThreadId = thread.id;
        persistState();
        renderThreadList();

        appendMessage("user", prompt);
        const thinking = appendThinkingMessage();
        const stopThinking = startThinkingStages(thinking.stage);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        promptEl.value = "";

        try {
          const history = thread.messages
            .slice(0, -1)
            .filter((item) => item.role === "user" || item.role === "assistant")
            .map((item) => ({ role: item.role, content: item.content }))
            .slice(-MAX_HISTORY_FOR_API);

          const response = await fetch(`${API_BASE}/api/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, history }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "API request failed.");
          }

          stopThinking();

          const reply = String(data.reply || "");
          await animateAssistantText(thinking.node, reply);
          if (Array.isArray(data.tool_events) && data.tool_events.length) {
            appendToolEvents(data.tool_events);
          }

          thread.messages.push({
            role: "assistant",
            content: reply,
            createdAt: nowIso(),
            toolEvents: Array.isArray(data.tool_events) ? data.tool_events : [],
          });
          thread.updatedAt = nowIso();
          thread.title = titleFromMessages(thread.messages);

          appState.threads = appState.threads.filter((item) => item.id !== thread.id);
          appState.threads.unshift(thread);
          appState.activeThreadId = thread.id;
          persistState();
          renderThreadList();
          setStatus("");
        } catch (error) {
          if (typeof stopThinking === "function") stopThinking();
          thinking.node.classList.remove("thinking");
          thinking.node.textContent = "I hit an error while processing that request.";
          thread.messages.push({
            role: "assistant",
            content: "I hit an error while processing that request.",
            createdAt: nowIso(),
            toolEvents: [],
          });
          thread.updatedAt = nowIso();
          appState.threads = appState.threads.filter((item) => item.id !== thread.id);
          appState.threads.unshift(thread);
          appState.activeThreadId = thread.id;
          persistState();
          renderThreadList();
          setStatus(error.message || "Request failed.", true);
        } finally {
          sendBtn.disabled = false;
          promptEl.disabled = false;
          promptEl.focus();
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    </script>
  </body>
</html>
