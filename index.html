<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskPilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a1024;
        --bg2: #0f1a3d;
        --panel: rgba(17, 24, 50, 0.82);
        --panel-border: rgba(137, 170, 255, 0.3);
        --text: #eaf1ff;
        --muted: #9cb0d9;
        --accent: #20d7a8;
        --user: #1d70ff;
        --assistant: #1b2447;
        --danger: #ff6666;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 700px at 0% 0%, #1d2a58 0%, transparent 60%),
          radial-gradient(1000px 600px at 100% 100%, #0d4f63 0%, transparent 55%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .app {
        width: min(900px, 100%);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      .header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .title {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.4px;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .badge {
        border: 1px solid rgba(32, 215, 168, 0.45);
        color: #8ef6dc;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
      }

      #messages {
        height: min(62vh, 620px);
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .msg.user {
        margin-left: auto;
        background: linear-gradient(125deg, #1252c5 0%, var(--user) 100%);
      }

      .msg.assistant {
        background: var(--assistant);
        border: 1px solid rgba(139, 158, 224, 0.4);
      }

      .tools {
        max-width: 95%;
        font-size: 0.85rem;
        color: var(--muted);
        border-left: 2px solid rgba(156, 176, 217, 0.5);
        padding-left: 10px;
      }

      .composer {
        border-top: 1px solid var(--panel-border);
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      textarea {
        width: 100%;
        resize: vertical;
        min-height: 58px;
        max-height: 200px;
        border: 1px solid rgba(141, 157, 209, 0.4);
        background: rgba(11, 17, 37, 0.7);
        color: var(--text);
        border-radius: 12px;
        padding: 10px;
        font: inherit;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      #sendBtn {
        background: var(--accent);
        color: #05261f;
      }

      #clearBtn {
        background: #2a355f;
        color: var(--text);
      }

      #status {
        min-height: 1em;
        color: var(--muted);
        font-size: 0.86rem;
      }

      #status.error {
        color: var(--danger);
      }

      @media (max-width: 680px) {
        .msg {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div>
          <h1 class="title">DeskPilot</h1>
          <p class="subtitle">Vercel-ready assistant with mock workflow tools</p>
        </div>
        <span class="badge">Serverless API</span>
      </section>

      <section id="messages"></section>

      <section class="composer">
        <textarea id="prompt" placeholder="Ask DeskPilot to draft emails, schedule, book trips, or edit Notion..."></textarea>
        <div class="row">
          <button id="sendBtn">Send</button>
          <button id="clearBtn" type="button">Clear Chat</button>
        </div>
        <div id="status"></div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "deskpilot-chat-history-v1";
      const messagesEl = document.getElementById("messages");
      const promptEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const clearBtn = document.getElementById("clearBtn");
      const statusEl = document.getElementById("status");

      let history = loadHistory();
      renderAll();

      sendBtn.addEventListener("click", onSend);
      clearBtn.addEventListener("click", () => {
        history = [];
        persistHistory();
        renderAll();
        setStatus("Chat cleared.");
      });
      promptEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          onSend();
        }
      });

      function loadHistory() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed.filter((item) => item && (item.role === "user" || item.role === "assistant"));
        } catch {
          return [];
        }
      }

      function persistHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      }

      function setStatus(text, isError = false) {
        statusEl.textContent = text || "";
        statusEl.className = isError ? "error" : "";
      }

      function appendMessage(role, content) {
        const node = document.createElement("article");
        node.className = `msg ${role}`;
        node.textContent = content;
        messagesEl.appendChild(node);
      }

      function appendToolEvents(toolEvents) {
        if (!toolEvents || !toolEvents.length) return;
        const box = document.createElement("div");
        box.className = "tools";
        box.textContent = "Tools used: " + toolEvents.map((e) => e.tool).join(", ");
        messagesEl.appendChild(box);
      }

      function renderAll() {
        messagesEl.innerHTML = "";
        if (!history.length) {
          appendMessage("assistant", "I am ready. Ask me to draft emails, schedule appointments, book trips, or edit Notion pages.");
        } else {
          history.forEach((item) => appendMessage(item.role, item.content));
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function onSend() {
        const prompt = promptEl.value.trim();
        if (!prompt) return;

        sendBtn.disabled = true;
        promptEl.disabled = true;
        setStatus("Thinking...");

        appendMessage("user", prompt);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        promptEl.value = "";

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, history }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "API request failed.");
          }

          history = Array.isArray(data.history) ? data.history : history.concat([{ role: "user", content: prompt }, { role: "assistant", content: data.reply || "" }]);
          persistHistory();

          appendMessage("assistant", data.reply || "");
          appendToolEvents(data.tool_events || []);
          setStatus("");
        } catch (error) {
          appendMessage("assistant", "I hit an error while processing that request.");
          setStatus(error.message || "Request failed.", true);
        } finally {
          sendBtn.disabled = false;
          promptEl.disabled = false;
          promptEl.focus();
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    </script>
  </body>
</html>
